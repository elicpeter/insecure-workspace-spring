spring:
  application:
    name: insecure-collab
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:insecure_collab}
    username: ${DB_USER:insecure_user}
    password: ${DB_PASSWORD:fake-password-not-for-real-systems}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  thymeleaf:
    cache: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    session:
      timeout: 12h
      cookie:
        name: INSECURECOLLABSESSION
        http-only: false
        secure: false

app:
  warning-banner: "INTENTIONALLY INSECURE - LOCAL TESTING ONLY - DO NOT DEPLOY"
  base-url: ${APP_BASE_URL:http://localhost:8080}
  fake-support-token: ${APP_FAKE_SUPPORT_TOKEN:fake-support-token-do-not-use}
  fake-webhook-secret: ${APP_WEBHOOK_SECRET:fake-webhook-secret-demo-only}
  upload-root: ./uploads
  export-root: ./exports

logging:
  level:
    root: INFO
    org.springframework.jdbc.core: DEBUG
    com.example.insecurecollab: DEBUG
