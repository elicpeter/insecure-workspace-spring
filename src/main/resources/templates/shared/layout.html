<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <title>InsecureCollab</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script defer th:src="@{/js/app.js}"></script>
</head>
<body>
<div class="banner" th:text="${warningBanner}"></div>
<header>
    <nav>
        <a th:href="@{/}">Home</a>
        <span th:if="${currentUser != null}">
            | <a th:href="@{/dashboard}">Dashboard</a>
            | <a th:href="@{/settings}">Settings</a>
            | <a th:href="@{/admin}" th:if="${currentUser.admin}">Admin</a>
            | <a th:href="@{/logout}">Logout</a>
        </span>
        <span th:unless="${currentUser != null}">
            | <a th:href="@{/login}">Login</a>
            | <a th:href="@{/register}">Register</a>
        </span>
    </nav>
</header>
<main th:replace="${content}"></main>
</body>
</html>
